name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux: build against musl so the resulting binary is statically
          # linked and runs on any distro without a glibc version dance.
          # zigbuild handles both x86 and cross-to-aarch64 from the same
          # ubuntu-latest runner.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: repo-analyzer-linux-amd64
            binary: repo-analyzer
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: repo-analyzer-linux-arm64
            binary: repo-analyzer
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: repo-analyzer-macos-amd64
            binary: repo-analyzer
            use_zigbuild: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: repo-analyzer-macos-arm64
            binary: repo-analyzer
            use_zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: repo-analyzer-windows-amd64.exe
            binary: repo-analyzer.exe
            use_zigbuild: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: repo-analyzer-windows-arm64.exe
            binary: repo-analyzer.exe
            use_zigbuild: false
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig (for zigbuild cross-compile)
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          # 0.13.0 has a shared-cache race in parallel cc that drops
          # tree-sitter-dart's parser.o before lld links it.
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        # 0.22.2 ships the fix for the shared-cache race (PR #421).
        run: cargo install --locked cargo-zigbuild@0.22.2

      - name: Build release binary (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/${{ matrix.artifact }}
