<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>repo-analyzer · report</title>

<!-- Tailwind v4 browser build -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- Lucide icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<!-- Inter font -->
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

<style type="text/tailwindcss">
@custom-variant dark (&:where(.dark, .dark *));

@theme static {
  --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Etiya brand palette — aligned with the main web app so the report
     blends into the dashboard instead of looking like a stranger. */
  --color-etiya: oklch(43.615% 0.09109 281.95);
  --color-etiya-50:  oklch(0.948 0.008 286.39);
  --color-etiya-100: oklch(0.898 0.015 286.17);
  --color-etiya-200: oklch(0.796 0.032 285.67);
  --color-etiya-300: oklch(0.691 0.05  285.05);
  --color-etiya-400: oklch(0.59  0.067 284.17);
  --color-etiya-500: oklch(0.489 0.078 283.15);
  --color-etiya-600: oklch(0.385 0.074 282.37);
  --color-etiya-700: oklch(0.276 0.053 282.36);
  --color-etiya-800: oklch(0.226 0.044 282.29);
  --color-etiya-900: oklch(0.178 0.035 282.32);
  --color-etiya-950: oklch(0.153 0.028 282.64);

  --color-brand-orange: #f58220;
}

/* Accent colour flips between Etiya purple (light) and brand orange (dark)
   to match the main site. Plain CSS vars so they can toggle at runtime. */
:root {
  --color-primary:      var(--color-etiya-600);
  --color-primary-soft: var(--color-etiya-500);
  --color-primary-bg:   var(--color-etiya-100);
}
.dark {
  --color-primary:      var(--color-brand-orange);
  --color-primary-soft: var(--color-brand-orange);
  --color-primary-bg:   color-mix(in oklab, var(--color-brand-orange) 14%, transparent);
}

@layer base {
  html { font-feature-settings: "cv11", "ss01"; }
  body { @apply font-sans text-sm antialiased bg-etiya-50 text-etiya-700; }
  html.dark body { @apply bg-etiya-950 text-etiya-200; }

  /* Scrollbars — match the main site. */
  * { scrollbar-width: thin; scrollbar-color: var(--color-etiya-400) var(--color-etiya-100); }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background-color: var(--color-etiya-400); border-radius: 9999px; }
  *::-webkit-scrollbar-thumb:hover { background-color: var(--color-etiya-600); }
  *::-webkit-scrollbar-track { background-color: var(--color-etiya-100); }
  .dark * { scrollbar-color: var(--color-etiya-500) var(--color-etiya-800); }
  .dark *::-webkit-scrollbar-thumb { background-color: var(--color-etiya-600); }
  .dark *::-webkit-scrollbar-thumb:hover { background-color: var(--color-etiya-400); }
  .dark *::-webkit-scrollbar-track { background-color: var(--color-etiya-800); }
}

@layer components {
  .card { @apply rounded-xl border shadow-sm bg-white border-etiya-100; }
  html.dark .card { @apply bg-etiya-900 border-etiya-800; }

  .stat-card {
    @apply rounded-xl border shadow-sm p-4 flex flex-col gap-1;
    @apply bg-white border-etiya-100;
  }
  html.dark .stat-card { @apply bg-etiya-900 border-etiya-800; }

  .nav-link {
    @apply flex items-center justify-between gap-2 rounded-md px-3 py-2 text-[13px] transition-colors;
    @apply text-etiya-600 hover:bg-etiya-100 hover:text-etiya-700;
  }
  html.dark .nav-link { @apply text-etiya-400 hover:bg-etiya-800/60 hover:text-etiya-100; }
  .nav-link.active { background: var(--color-primary-bg); color: var(--color-primary); }
  .nav-badge {
    @apply text-[10px] px-1.5 py-0.5 rounded-full tabular-nums bg-etiya-200 text-etiya-600;
  }
  html.dark .nav-badge { @apply bg-etiya-800 text-etiya-400; }

  .report-section {
    @apply rounded-xl border shadow-sm overflow-hidden scroll-mt-4;
    @apply bg-white border-etiya-100;
  }
  html.dark .report-section { @apply bg-etiya-900 border-etiya-800; }
  .section-header {
    @apply flex items-center justify-between gap-3 cursor-pointer select-none px-5 py-4 transition-colors;
  }
  .section-header:hover { @apply bg-etiya-50; }
  html.dark .section-header:hover { @apply bg-etiya-800/40; }
  .section-header h2 { @apply flex items-center gap-2 text-base font-semibold; }
  .section-header h2 svg { color: var(--color-primary); }
  .entry-count {
    @apply text-xs font-normal px-2 py-0.5 rounded-full tabular-nums bg-etiya-100 text-etiya-600;
  }
  html.dark .entry-count { @apply bg-etiya-800 text-etiya-400; }
  .toggle-chevron { @apply text-etiya-400 transition-transform; }
  .section-body { @apply px-5 pb-5 border-t border-etiya-100; }
  html.dark .section-body { @apply border-etiya-800; }
  .section-body.collapsed { @apply hidden; }
  .section-desc {
    @apply text-[13px] leading-6 py-3 text-etiya-600 border-b border-dashed border-etiya-100 mb-4;
  }
  html.dark .section-desc { @apply text-etiya-400 border-etiya-800; }

  .filter-input {
    @apply w-52 rounded-md border px-2.5 py-1.5 text-xs outline-none transition-all;
    @apply bg-white border-etiya-200 text-etiya-700;
  }
  .filter-input:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--color-primary) 20%, transparent);
  }
  html.dark .filter-input {
    @apply bg-etiya-900 border-etiya-700 text-etiya-100;
  }

  /* One grid for all rows (subgrid) so the value column is the same width
     across every row; otherwise each row's `auto` column sizes to its own
     content and the bar track (`1fr`) ends up different widths per row. */
  .bars { @apply grid grid-cols-[1fr_auto] gap-x-3 gap-y-1 mb-4; }
  .bar-row { @apply col-span-2 grid grid-cols-subgrid items-center py-0.5; }
  .bar-row.extra-row { @apply hidden; }
  .bar-row.extra-row.visible { @apply grid; }
  .bar-track { @apply relative h-6 rounded overflow-hidden flex items-center bg-etiya-100; }
  html.dark .bar-track { @apply bg-etiya-800/60; }
  .bar {
    @apply h-full min-w-[2px] transition-[width] duration-300;
    background: linear-gradient(
      90deg,
      var(--color-primary) 0%,
      color-mix(in oklab, var(--color-primary) 55%, var(--color-etiya-200)) 100%
    );
  }
  .bar-label {
    @apply absolute left-2 text-[11.5px] whitespace-nowrap overflow-hidden text-ellipsis max-w-[calc(100%-1rem)] z-10 font-mono text-etiya-700;
    text-shadow: 0 0 4px rgba(255, 255, 255, 0.65);
  }
  html.dark .bar-label { @apply text-etiya-100; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6); }
  .bar-value { @apply font-mono text-[11.5px] tabular-nums text-etiya-500; }
  html.dark .bar-value { @apply text-etiya-400; }

  table { @apply w-full border-collapse tabular-nums; }
  thead th {
    @apply text-left px-3 py-2 text-[10.5px] font-semibold tracking-wider uppercase;
    @apply border-b text-etiya-500 bg-white sticky top-0 border-etiya-200;
  }
  html.dark thead th { @apply border-etiya-700 text-etiya-400 bg-etiya-900; }
  /* Health gauge — a circular 0-100 score indicator whose colour is
     interpolated from red to green via HSL (no JS library needed). */
  .health-hero { @apply flex items-center gap-6 mb-4 mt-2; }
  .gauge { @apply relative flex items-center justify-center flex-shrink-0; width: 140px; height: 140px; }
  .gauge svg { transform: rotate(-90deg); }
  .gauge-track { stroke: color-mix(in oklab, var(--color-etiya-400) 30%, transparent); fill: none; }
  .gauge-fill { fill: none; transition: stroke-dashoffset 700ms ease-out; stroke-linecap: round; }
  .gauge-label { @apply absolute inset-0 flex items-center justify-center font-mono; }
  .gauge-score { @apply text-5xl font-bold leading-none; }
  .health-text { @apply flex-1; }
  .health-interp { @apply text-sm text-etiya-600; }
  html.dark .health-interp { @apply text-etiya-300; }

  /* break-words (overflow-wrap: anywhere) lets long identifiers and file
     paths wrap consistently across all cells, so rows stay short instead
     of the first column wrapping while later columns push the row tall. */
  tbody td { @apply px-3 py-2 text-[12.5px] border-b border-etiya-100 break-words; overflow-wrap: anywhere; }
  html.dark tbody td { @apply border-etiya-800; }
  tbody td:first-child { @apply font-mono; color: var(--color-primary); }
  tbody tr:hover { @apply bg-etiya-50; }
  html.dark tbody tr:hover { @apply bg-etiya-800/40; }
  tbody tr.extra-row { @apply hidden; }
  tbody tr.extra-row.visible { display: table-row; }
  .num { @apply text-right font-mono; }

  .pill { @apply inline-block px-2 py-0.5 rounded-full text-[11px] font-medium; }
  .pill-good { @apply bg-emerald-100 text-emerald-700; }
  html.dark .pill-good { @apply bg-emerald-500/10 text-emerald-400; }
  .pill-warn { @apply bg-amber-100 text-amber-700; }
  html.dark .pill-warn { @apply bg-amber-500/10 text-amber-300; }
  .pill-bad { @apply bg-rose-100 text-rose-700; }
  html.dark .pill-bad { @apply bg-rose-500/10 text-rose-400; }

  .show-more-btn {
    @apply inline-flex items-center gap-1.5 mt-3 rounded-md border px-3 py-1.5 text-[12px] cursor-pointer transition-colors;
    @apply border-etiya-200 hover:bg-etiya-100;
    color: var(--color-primary);
  }
  html.dark .show-more-btn {
    @apply border-etiya-700 hover:bg-etiya-800;
  }

  .group-header {
    @apply flex items-center gap-2 mt-4 mb-2 pt-4 text-sm font-semibold capitalize;
    @apply border-t border-dashed border-etiya-100;
    color: var(--color-primary);
  }
  html.dark .group-header { @apply border-etiya-800; }
  .group-header:first-child { @apply border-t-0 pt-0; }
  .group-count { @apply text-xs font-normal ml-1.5 text-etiya-500; }
  html.dark .group-count { @apply text-etiya-400; }

  .icon-btn {
    @apply inline-flex items-center justify-center w-8 h-8 rounded-md transition-colors;
    @apply text-etiya-500 hover:bg-etiya-200 hover:text-etiya-700;
  }
  html.dark .icon-btn { @apply text-etiya-400 hover:bg-etiya-800 hover:text-etiya-100; }
}
</style>
</head>
<body>

<!-- Embedded report payload. All rendering below reads from this. -->
<script id="report-data" type="application/json">{{REPORT_DATA_JSON}}</script>

<!-- Centered wrapper: sidebar sits right next to the cards, both travel
     together within the same max-width so the sidebar always hugs the
     content's left edge instead of pinning to the viewport. -->
<div class="min-h-screen max-w-[1400px] mx-auto flex gap-6 px-6 py-6 max-lg:flex-col max-lg:px-4 max-lg:py-4">

  <!-- Sidebar — sticky card next to the main content -->
  <aside class="w-64 flex-shrink-0 sticky top-6 self-start max-h-[calc(100vh-3rem)] overflow-y-auto rounded-xl border shadow-sm bg-white border-etiya-100 px-3 py-4 max-lg:static max-lg:w-full max-lg:max-h-none dark:bg-etiya-900 dark:border-etiya-800">
    <div class="flex items-center justify-between px-2 mb-1">
      <h1 class="flex items-center gap-2 font-semibold text-[15px]" style="color: var(--color-primary)">
        <i data-lucide="git-branch" class="w-4 h-4"></i> repo-analyzer
      </h1>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        <i data-lucide="sun" class="w-4 h-4 hidden dark:inline"></i>
        <i data-lucide="moon" class="w-4 h-4 inline dark:hidden"></i>
      </button>
    </div>
    <div class="text-[11px] px-2 text-etiya-500 mb-5">Generated: <span id="generated-at" data-iso="{{GENERATED_AT}}">{{GENERATED_AT}}</span></div>
    <nav id="toc" class="flex flex-col gap-0.5"></nav>

    <div class="mt-4 pt-3 border-t border-etiya-100 dark:border-etiya-800 flex gap-1.5 px-1">
      <button id="expand-all" class="flex-1 inline-flex items-center justify-center gap-1 text-[11px] rounded-md py-1.5 border border-etiya-200 text-etiya-600 hover:bg-etiya-100 dark:border-etiya-700 dark:text-etiya-300 dark:hover:bg-etiya-800 transition-colors">
        <i data-lucide="chevrons-down" class="w-3 h-3"></i> Expand all
      </button>
      <button id="collapse-all" class="flex-1 inline-flex items-center justify-center gap-1 text-[11px] rounded-md py-1.5 border border-etiya-200 text-etiya-600 hover:bg-etiya-100 dark:border-etiya-700 dark:text-etiya-300 dark:hover:bg-etiya-800 transition-colors">
        <i data-lucide="chevrons-up" class="w-3 h-3"></i> Collapse all
      </button>
    </div>
  </aside>

  <!-- Main — takes the remaining width inside the centered wrapper -->
  <main class="flex-1 min-w-0">

    <!-- Hero -->
    <section class="mb-8">
      <h2 class="text-2xl font-semibold tracking-tight mb-1">Repository analysis</h2>
      <p class="text-etiya-500 dark:text-etiya-400">Commit-history metrics, refactor candidates, and ownership insights.</p>
      <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5"></div>
    </section>

    <!-- All report sections render here -->
    <div id="sections" class="space-y-5"></div>

  </main>
</div>

<script>
(() => {
  // ------------------------------------------------------------------
  // Theme (persist in localStorage; default from system setting)
  // ------------------------------------------------------------------
  const root = document.documentElement;
  const stored = localStorage.getItem('theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (stored === 'light' || (!stored && !systemDark)) root.classList.remove('dark');
  else root.classList.add('dark');
  document.getElementById('theme-toggle').addEventListener('click', () => {
    root.classList.toggle('dark');
    localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
  });

  // ------------------------------------------------------------------
  // Humanize the "generated at" timestamp using the viewer's locale.
  // ------------------------------------------------------------------
  (() => {
    const span = document.getElementById('generated-at');
    if (!span) return;
    const iso = span.dataset.iso;
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return;
    try {
      span.textContent = new Intl.DateTimeFormat(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      }).format(d);
      span.title = iso;
    } catch (_) {}
  })();

  // ------------------------------------------------------------------
  // Read embedded data
  // ------------------------------------------------------------------
  const raw = document.getElementById('report-data').textContent;
  let DATA = [];
  try { DATA = JSON.parse(raw); } catch (e) { console.error('Bad report JSON', e); }

  // Order reports from "most actionable / risk" at the top to plain descriptive
  // stats at the bottom. Readers typically care about problems first.
  const REPORT_ORDER = [
    // Overall health + actions at the very top.
    'health',
    // Opening frame: what is the repo made of?
    'composition',
    // Immediate risk / refactor candidates
    'outliers', 'knowledge_silos', 'succession', 'hotspots',
    'complexity', 'large_sources', 'construct_ownership', 'construct_churn',
    // Codebase health / hygiene
    'bloat', 'quality', 'debt_markers', 'half_life',
    // Architecture / relationships
    'coupling', 'module_coupling', 'fan_in_out', 'churn_pareto',
    // Plain history / descriptive
    'churn', 'age', 'ownership', 'authors', 'patterns', 'commit_velocity',
    // Code shape
    'test_ratio',
  ];
  const ORDER_INDEX = new Map(REPORT_ORDER.map((n, i) => [n, i]));
  DATA.sort((a, b) => {
    const ai = ORDER_INDEX.has(a.name) ? ORDER_INDEX.get(a.name) : 1000;
    const bi = ORDER_INDEX.has(b.name) ? ORDER_INDEX.get(b.name) : 1000;
    return ai - bi;
  });

  // ------------------------------------------------------------------
  // Small DOM helpers
  // ------------------------------------------------------------------
  const el = (tag, attrs, ...children) => {
    const n = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs || {})) {
      if (k === 'class') n.className = v;
      else if (k === 'html') n.innerHTML = v;
      else if (k.startsWith('data-')) n.setAttribute(k, v);
      else if (k === 'text') n.textContent = v;
      else n[k] = v;
    }
    for (const c of children) {
      if (c == null) continue;
      n.append(c.nodeType ? c : document.createTextNode(String(c)));
    }
    return n;
  };
  const fmt = v => {
    if (v == null) return '';
    if (typeof v === 'number') return Number.isInteger(v) ? v.toString() : v.toFixed(2);
    return String(v);
  };
  const isNum = v => typeof v === 'number';

  const ICON_MAP = {
    authors: 'users', hotspots: 'flame', churn: 'activity',
    ownership: 'shield', coupling: 'link', patterns: 'clock',
    age: 'calendar', bloat: 'hard-drive', composition: 'pie-chart',
    health: 'heart-pulse', debt_markers: 'sticky-note', large_sources: 'file-code-2',
    outliers: 'triangle-alert', quality: 'check-circle', complexity: 'git-merge',
    construct_churn: 'code-2', construct_ownership: 'user-check',
    half_life: 'hourglass', succession: 'user-plus', knowledge_silos: 'lock',
    fan_in_out: 'share-2', module_coupling: 'boxes', churn_pareto: 'bar-chart-3',
    commit_velocity: 'trending-up', test_ratio: 'test-tube-2',
    commit_size: 'ruler', doc_coverage: 'book-open',
    dead_code: 'ghost', clones: 'copy'
  };
  const ICON_DEFAULT = 'file-text';

  // ------------------------------------------------------------------
  // Pill classification
  // ------------------------------------------------------------------
  const BAD  = /risk|god|urgent|orphaned|very high|hot zone|chaos/i;
  const WARN = /high|transfer needed|refactor|consider|stale|large|unmerged|diffuse|single-owner|minified|aging|bus factor 1/i;
  const GOOD = /\bok\b|healthy|simple|stable|safe to delete|handed off|mostly stable|distributed/i;
  const pillFor = s => {
    if (!s || s.length > 60) return null;
    if (BAD.test(s))  return 'pill-bad';
    if (WARN.test(s)) return 'pill-warn';
    if (GOOD.test(s)) return 'pill-good';
    return null;
  };

  // ------------------------------------------------------------------
  // Per-table rendering
  // ------------------------------------------------------------------
  const TOP_N = 10;

  function renderEntries(entries, columns, labels) {
    const container = el('div');
    if (!entries || entries.length === 0) {
      container.append(el('p', { class: 'text-etiya-500 italic text-[12px]', text: '(no entries)' }));
      return container;
    }

    // Some reports (e.g. commit_size) share one column list across entry
    // groups where each group only populates a subset. Drop columns that
    // every row leaves blank so the table isn't littered with empty cells.
    const activeIdx = columns
      .map((c, i) => ({ c, i }))
      .filter(({ c }) => entries.some(e => e.values && e.values[c] != null));
    const activeCols = activeIdx.map(x => x.c);
    const activeLabels = activeIdx.map(x => labels[x.i] || x.c);

    // Pick first numeric column for bar chart, skipping bookkeeping columns
    // like `order` or `rank` that index rows rather than measure them.
    const SKIP_COLS = new Set(['order', 'rank', 'id']);
    const barCol = activeCols.find(c => {
      if (SKIP_COLS.has(c.toLowerCase())) return false;
      const e = entries.find(x => x.values && x.values[c] != null);
      return e && isNum(e.values[c]);
    });

    if (barCol) {
      const bars = el('div', { class: 'bars' });
      let max = 0;
      for (const e of entries) {
        const v = e.values[barCol];
        if (isNum(v) && v > max) max = v;
      }
      entries.forEach((e, i) => {
        const v = e.values[barCol];
        const num = isNum(v) ? v : 0;
        const pct = max > 0 ? Math.round((num / max) * 100) : 0;
        const row = el('div', { class: 'bar-row' + (i >= TOP_N ? ' extra-row' : '') },
          el('div', { class: 'bar-track' },
            el('span', { class: 'bar', style: `width:${pct}%` }),
            el('span', { class: 'bar-label', text: e.key })
          ),
          el('span', { class: 'bar-value', text: fmt(v) })
        );
        bars.append(row);
      });
      container.append(bars);
    }

    // Filter input for larger tables
    if (entries.length >= 5) {
      const toolbar = el('div', { class: 'flex justify-end mb-2' });
      const input = el('input', { class: 'filter-input', type: 'text', placeholder: 'Filter rows…' });
      toolbar.append(input);
      container.append(toolbar);
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase();
        Array.from(tbody.children).forEach(tr => {
          const match = !q || tr.textContent.toLowerCase().includes(q);
          tr.style.display = match ? '' : 'none';
        });
      });
    }

    const table = el('table');
    const thead = el('thead');
    const headRow = el('tr', null, el('th', { text: 'Name' }));
    activeCols.forEach((col, i) => {
      headRow.append(el('th', { text: activeLabels[i] || col }));
    });
    thead.append(headRow);
    table.append(thead);

    const tbody = el('tbody');
    entries.forEach((e, i) => {
      const tr = el('tr');
      if (i >= TOP_N) tr.className = 'extra-row';
      tr.append(el('td', { text: e.key }));
      for (const col of activeCols) {
        const v = e.values ? e.values[col] : undefined;
        const td = el('td');
        if (isNum(v)) td.className = 'num';
        const txt = fmt(v);
        const pcls = pillFor(txt);
        if (pcls) td.append(el('span', { class: 'pill ' + pcls, text: txt }));
        else td.textContent = txt;
        tr.append(td);
      }
      tbody.append(tr);
    });
    table.append(tbody);
    container.append(table);

    if (entries.length > TOP_N) {
      const remaining = entries.length - TOP_N;
      const btn = el('button', {
        class: 'show-more-btn',
        'data-expanded': 'false',
        text: `Show ${remaining} more entries`,
      });
      btn.addEventListener('click', ev => {
        ev.stopPropagation();
        const expanded = btn.dataset.expanded === 'true';
        container.querySelectorAll('.extra-row').forEach(r => r.classList.toggle('visible', !expanded));
        btn.dataset.expanded = String(!expanded);
        btn.textContent = expanded ? `Show ${remaining} more entries` : `Show top ${TOP_N} only`;
      });
      container.append(btn);
    }

    return container;
  }

  // ------------------------------------------------------------------
  // Per-report section
  // ------------------------------------------------------------------
  // ------------------------------------------------------------------
  // Health score gauge helpers
  // ------------------------------------------------------------------
  function findOverallEntry(groups) {
    const overallGroup = groups.find(g => g.name === 'overall');
    if (!overallGroup) return null;
    const entry = (overallGroup.entries || []).find(e => e.key === 'overall');
    return entry || null;
  }

  function buildHealthHero(overallEntry) {
    const rawScore = overallEntry.values && overallEntry.values.score;
    const score = typeof rawScore === 'number' ? Math.max(0, Math.min(100, rawScore)) : 0;
    const details = (overallEntry.values && overallEntry.values.details) || '';
    const action = (overallEntry.values && overallEntry.values.action) || '';

    // Interpolate red→yellow→green via HSL. 0 → hue 0 (red), 100 → hue 120 (green).
    const hue = (score / 100) * 120;
    const color = 'hsl(' + hue + ', 75%, 45%)';

    const size = 140;
    const stroke = 12;
    const radius = (size - stroke) / 2;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference * (1 - score / 100);

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', String(size));
    svg.setAttribute('height', String(size));
    svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
    const track = document.createElementNS(svgNS, 'circle');
    track.setAttribute('class', 'gauge-track');
    track.setAttribute('cx', String(size / 2));
    track.setAttribute('cy', String(size / 2));
    track.setAttribute('r', String(radius));
    track.setAttribute('stroke-width', String(stroke));
    svg.appendChild(track);
    const fill = document.createElementNS(svgNS, 'circle');
    fill.setAttribute('class', 'gauge-fill');
    fill.setAttribute('cx', String(size / 2));
    fill.setAttribute('cy', String(size / 2));
    fill.setAttribute('r', String(radius));
    fill.setAttribute('stroke-width', String(stroke));
    fill.setAttribute('stroke', color);
    fill.setAttribute('stroke-dasharray', String(circumference));
    fill.setAttribute('stroke-dashoffset', String(offset));
    svg.appendChild(fill);

    const gauge = el('div', { class: 'gauge' },
      svg,
      el('div', { class: 'gauge-label' },
        el('span', { class: 'gauge-score', style: 'color: ' + color, text: String(score) })
      )
    );

    const text = el('div', { class: 'health-text' },
      el('div', { class: 'health-interp', text: details + (action ? ' · ' + action : '') })
    );

    return el('div', { class: 'health-hero' }, gauge, text);
  }

  function renderSection(report, index) {
    const iconName = ICON_MAP[report.name] || ICON_DEFAULT;
    const totalRows = (report.entry_groups && report.entry_groups.length)
      ? report.entry_groups.reduce((s, g) => s + (g.entries ? g.entries.length : 0), 0)
      : (report.entries ? report.entries.length : 0);

    const section = el('section', {
      class: 'report-section',
      id: 'sec-' + index,
      'data-report-name': report.name,
    });

    const header = el('header', { class: 'section-header' });
    const h2 = el('h2', null,
      (() => { const i = el('i'); i.setAttribute('data-lucide', iconName); i.className = 'w-4 h-4'; return i; })(),
      document.createTextNode(report.display_name || report.name),
      el('span', { class: 'entry-count', text: totalRows + ' entries' })
    );
    const chevWrap = el('span', { class: 'toggle-chevron', html: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' });
    header.append(h2, chevWrap);
    section.append(header);

    // Sections start collapsed — readers expand only the ones they care about,
    // either by clicking the header or the sidebar link.
    const body = el('div', { class: 'section-body collapsed' });
    chevWrap.style.transform = 'rotate(-90deg)';
    if (report.description) {
      body.append(el('p', { class: 'section-desc', text: report.description }));
    }

    const columns = report.columns || [];
    const labels = (report.column_labels && report.column_labels.length)
      ? report.column_labels : columns;

    // Health report gets a big circular score gauge at the top — the
    // information is in the "Overall" entry group, but the gauge conveys it
    // at a glance so we hide that group from the normal table below.
    let groupsToRender = report.entry_groups || [];
    if (report.name === 'health' && groupsToRender.length) {
      const overall = findOverallEntry(groupsToRender);
      if (overall) {
        body.append(buildHealthHero(overall));
        groupsToRender = groupsToRender.filter(g => g.name !== 'overall');
      }
    }

    if (groupsToRender.length) {
      groupsToRender.forEach(g => {
        body.append(el('h3', { class: 'group-header' },
          g.label || g.name,
          el('span', { class: 'group-count', text: '(' + (g.entries || []).length + ' entries)' })
        ));
        body.append(renderEntries(g.entries || [], columns, labels));
      });
    } else if (!(report.entry_groups && report.entry_groups.length)) {
      body.append(renderEntries(report.entries || [], columns, labels));
    }

    section.append(body);

    // Collapse/expand on header click
    header.addEventListener('click', () => {
      body.classList.toggle('collapsed');
      chevWrap.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0)';
    });

    return section;
  }

  // ------------------------------------------------------------------
  // Sidebar + stat cards
  // ------------------------------------------------------------------
  const sectionsRoot = document.getElementById('sections');
  const tocRoot = document.getElementById('toc');

  DATA.forEach((r, i) => {
    sectionsRoot.append(renderSection(r, i));
    const totalRows = (r.entry_groups && r.entry_groups.length)
      ? r.entry_groups.reduce((s, g) => s + (g.entries ? g.entries.length : 0), 0)
      : (r.entries ? r.entries.length : 0);
    const iconName = ICON_MAP[r.name] || ICON_DEFAULT;
    const a = el('a', { href: '#sec-' + i, class: 'nav-link' },
      el('span', { class: 'flex items-center gap-2 min-w-0 truncate' },
        (() => { const ic = el('i'); ic.setAttribute('data-lucide', iconName); ic.className = 'w-3.5 h-3.5 flex-shrink-0'; return ic; })(),
        el('span', { class: 'truncate', text: r.display_name || r.name })
      ),
      el('span', { class: 'nav-badge', text: String(totalRows) })
    );
    // Sidebar click expands the target section so the user actually sees it.
    a.addEventListener('click', () => {
      const target = document.getElementById('sec-' + i);
      if (!target) return;
      const body = target.querySelector('.section-body');
      const chev = target.querySelector('.toggle-chevron');
      if (body && body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        if (chev) chev.style.transform = 'rotate(0)';
      }
    });
    tocRoot.append(a);
  });

  // Stat cards
  const totalReports = DATA.length;
  const totalRows = DATA.reduce((s, r) => {
    if (r.entry_groups && r.entry_groups.length) {
      return s + r.entry_groups.reduce((x, g) => x + (g.entries ? g.entries.length : 0), 0);
    }
    return s + (r.entries ? r.entries.length : 0);
  }, 0);
  const totalGroups = DATA.reduce((s, r) => s + ((r.entry_groups && r.entry_groups.length) || 0), 0);
  const riskCount = (() => {
    let n = 0;
    for (const r of DATA) {
      const all = (r.entries || []).concat(...(r.entry_groups || []).map(g => g.entries || []));
      for (const e of all) {
        for (const v of Object.values(e.values || {})) {
          if (typeof v === 'string' && BAD.test(v)) n++;
        }
      }
    }
    return n;
  })();

  const statCard = (icon, iconStyle, label, value) => {
    const c = el('div', { class: 'stat-card' });
    const header = el('div', { class: 'flex items-center gap-2' });
    const ic = el('i'); ic.setAttribute('data-lucide', icon);
    ic.className = 'w-3.5 h-3.5';
    if (iconStyle) ic.setAttribute('style', iconStyle);
    header.append(ic, el('span', { class: 'text-[10.5px] uppercase tracking-wider text-etiya-500 dark:text-etiya-400', text: label }));
    c.append(header, el('div', { class: 'text-2xl font-semibold tabular-nums mt-0.5', text: String(value) }));
    return c;
  };
  const stats = document.getElementById('stats');
  const primaryIcon = 'color: var(--color-primary)';
  const dangerIcon  = 'color: #f43f5e'; // rose-500 stays semantic for risk
  stats.append(
    statCard('layers', primaryIcon, 'Reports', totalReports),
    statCard('list', primaryIcon, 'Rows', totalRows.toLocaleString()),
    statCard('folder-tree', primaryIcon, 'Groups', totalGroups),
    statCard('triangle-alert', dangerIcon, 'Risk flags', riskCount),
  );

  // ------------------------------------------------------------------
  // Expand all / collapse all
  // ------------------------------------------------------------------
  const setAll = (collapsed) => {
    document.querySelectorAll('.section-body').forEach(body => {
      body.classList.toggle('collapsed', collapsed);
    });
    document.querySelectorAll('.toggle-chevron').forEach(chev => {
      chev.style.transform = collapsed ? 'rotate(-90deg)' : 'rotate(0)';
    });
  };
  document.getElementById('expand-all').addEventListener('click', () => setAll(false));
  document.getElementById('collapse-all').addEventListener('click', () => setAll(true));

  // ------------------------------------------------------------------
  // Scrollspy
  // ------------------------------------------------------------------
  const links = Array.from(tocRoot.querySelectorAll('a'));
  const sections = Array.from(sectionsRoot.querySelectorAll('.report-section'));
  const setActive = () => {
    let current = null;
    for (const sec of sections) {
      if (sec.getBoundingClientRect().top < 140) current = sec.id;
    }
    links.forEach(a => a.classList.toggle('active', a.hash === '#' + current));
  };
  window.addEventListener('scroll', setActive, { passive: true });
  setActive();

  // Render all icons last (after DOM is built)
  if (window.lucide) window.lucide.createIcons();
})();
</script>
</body>
</html>
